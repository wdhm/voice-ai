# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: voice-ai
metadata:
  template: voice-ai

infra:
  provider: bicep
  path: infra

hooks:
  preprovision:
    shell: pwsh
    run: |
      Write-Host "Detecting your Azure AD object ID..."
      $objectId = az ad signed-in-user show --query id -o tsv
      if (-not $objectId) {
        Write-Error "Could not detect your Azure AD object ID. Run 'az login' first."
        exit 1
      }
      Write-Host "Object ID: $objectId"
      azd env set AZURE_USER_OBJECT_ID $objectId
  postprovision:
    shell: pwsh
    run: |
      $endpoint = azd env get-value AZURE_VOICELIVE_ENDPOINT 2>$null
      if ($endpoint) {
        Write-Host ""
        Write-Host "=========================================="
        Write-Host " Azure resources provisioned successfully!"
        Write-Host "=========================================="
        Write-Host ""
        Write-Host " Endpoint: $endpoint"
        Write-Host ""
        Write-Host " To start the backend:"
        Write-Host "   cd backend/VoiceBot"
        Write-Host "   `$env:AZURE_VOICELIVE_ENDPOINT = `"$endpoint`""
        Write-Host "   dotnet run"
        Write-Host ""
        Write-Host " To start the frontend:"
        Write-Host "   cd frontend"
        Write-Host "   npm install; npm run dev"
        Write-Host ""
      }
